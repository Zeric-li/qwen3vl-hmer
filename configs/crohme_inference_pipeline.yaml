pipeline_type: inference_only

model_id: Qwen/Qwen3-VL-4B-Instruct
output_dir: ./outputs/qwen3vl-crohme-base
run_name: qwen3vl-crohme-base

eval_dataset_id: Neeze/CROHME-full
eval_splits:
  - "2014"
  - "2016"
  - "2019"

max_eval_samples: null
eval_batch_size: 1
seed: 42

system_prompt: >-
  You are a precise handwritten mathematical expression recognition (HMER) system.
  Extract and Print the expression of the formula in the image using LaTeX format. 

user_prompt: >-
  Do not wrap the answer in markdown or LaTeX fences.
  Do not add any text, spaces before or after.

min_pixels: 200704
max_pixels: 602112
max_new_tokens: 128

torch_dtype: bfloat16
attn_implementation: flash_attention_2
