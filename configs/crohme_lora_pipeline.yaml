pipeline_type: lora_train_eval

model_id: Qwen/Qwen3-VL-4B-Instruct
output_dir: ./outputs/qwen3vl-crohme-lora
run_name: qwen3vl-crohme-lora

train_dataset_id: Neeze/CROHME-full
train_split: train

eval_dataset_id: Neeze/CROHME-full
train_eval_split: "2014"
eval_splits:
  - "2014"
  - "2016"
  - "2019"

max_train_samples: null
max_eval_samples: null
cdm_toolkit_path: ./external/UniMERNet/cdm
cdm_pools: 8
shuffle_train: true
seed: 42

system_prompt: >-
  You are a precise handwritten mathematical expression OCR system.
  Output only the expression content itself, with no surrounding formatting or wrapper symbols.

user_prompt: >-
  Print the raw LaTeX sequence presented in the image.
  Do not wrap the answer in markdown or LaTeX fences.
  Do not add any text, spaces before or after.

min_pixels: 200704
max_pixels: 602112

max_seq_length: 1024
max_new_tokens: 128

torch_dtype: bfloat16
attn_implementation: flash_attention_2

gradient_checkpointing: true
per_device_train_batch_size: 2
per_device_eval_batch_size: 1
gradient_accumulation_steps: 8
num_train_epochs: 2
learning_rate: 2.0e-4
weight_decay: 0.0
warmup_ratio: 0.03
lr_scheduler_type: cosine
logging_steps: 10
save_steps: 200
eval_steps: 200
save_total_limit: 2

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_bias: none
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj

report_to: none
